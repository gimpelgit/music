<a [routerLink]="['/albums', album.id]" class="text-decoration-none">
  <div class="card h-100 shadow-sm album-card">
    <img 
      [src]="getCoverImage()" 
      [alt]="album.title"
      class="card-img-top"
      style="aspect-ratio: 1/1; object-fit: cover;">
    <div class="card-body">
      <h5 class="card-title text-truncate text-dark">{{ album.title }}</h5>
    </div>
  </div>
</a>
