version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: music-db
    environment:
      POSTGRES_DB: music
      POSTGRES_USER: psqluser
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - music-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psqluser -d music"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: music-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/music
      DB_USERNAME: psqluser
      DB_PASSWORD: password
      JWT_SECRET: mySecretKeyForJWTTokenGenerationAndValidation2026
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - music-network
    restart: unless-stopped

  frontend-react:
    build:
      context: ./frontend/react
      dockerfile: Dockerfile
    container_name: music-frontend-react
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - music-network
    restart: unless-stopped

  frontend-angular:
    build:
      context: ./frontend/angular
      dockerfile: Dockerfile
    container_name: music-frontend-angular
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - music-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  music-network:
    driver: bridge